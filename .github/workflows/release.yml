name: Release
# Publishes packages to npm when a v* tag is pushed. Owner-approved automation (DECISIONS D21).
# Uses npm trusted publishing (OIDC provenance) — configure once per package on npmjs.com:
# package settings → Trusted publisher → GitHub Actions → catalint/telic, workflow release.yml.
# NOTE: a package's FIRST publish cannot use trusted publishing (the package must exist) —
# first publishes are manual; the version-exists guards below make re-runs green.
on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      # OIDC trusted publishing requires npm >= 11.5.1 (Node 22 bundles 10.x)
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun run typecheck
      - run: bun run test
      - run: bun run size
      - name: Publish @telic/core
        working-directory: packages/core
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@telic/core@$VERSION" version > /dev/null 2>&1; then
            echo "@telic/core@$VERSION already published — skipping"
          else
            npm publish --provenance --access public
          fi
      - name: Publish @telic/react
        working-directory: packages/react
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@telic/react@$VERSION" version > /dev/null 2>&1; then
            echo "@telic/react@$VERSION already published — skipping"
          else
            npm publish --provenance --access public
          fi
