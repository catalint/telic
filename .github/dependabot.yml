version: 2
updates:
  - package-ecosystem: npm
    directories:
      - "/"
      - "/packages/core"
      - "/packages/react"
      - "/packages/lint"
    schedule:
      interval: weekly
    groups:
      dev-dependencies:
        dependency-type: development
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
