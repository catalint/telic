name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v7
        with:
          node-version: latest
      - run: bun install --frozen-lockfile
      - name: Conventions gate
        run: bun run conventions
      - name: Build
        run: bun run build
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun run test
      - name: Size gate
        run: bun run size
      # Packaging shape is verified for EVERY published package — D24 shipped a
      # broken @telic/react precisely because only core was checked here. publint
      # runs on all three; attw runs wherever there is a types/exports surface to
      # resolve (core, react) — the lint CLI is bin-only with no exports map, so
      # attw has nothing to check there.
      - name: publint (core)
        working-directory: packages/core
        run: bunx publint --strict
      - name: publint (react)
        working-directory: packages/react
        run: bunx publint --strict
      - name: publint (lint)
        working-directory: packages/lint
        run: bunx publint --strict
      # Full attw profile (D20): node16 (from ESM) and bundler resolution must
      # be fully green — the emitted files use extensioned relative imports.
      # The two ignored rules are the only ones genuinely N/A for an ESM-only
      # package (DECISIONS D6/D8):
      #   - no-resolution: node10 resolution predates "exports" maps, so an
      #     exports-only package can never resolve there by design.
      #   - cjs-resolves-to-esm: require() consumers are out of contract; Node
      #     CJS callers can still use dynamic import().
      - name: arethetypeswrong (core)
        working-directory: packages/core
        run: bunx @arethetypeswrong/cli --pack . --ignore-rules no-resolution cjs-resolves-to-esm
      - name: arethetypeswrong (react)
        working-directory: packages/react
        run: bunx @arethetypeswrong/cli --pack . --ignore-rules no-resolution cjs-resolves-to-esm

  consumer-matrix:
    runs-on: ubuntu-latest
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        # The emitted .d.ts must compile on the whole support floor (TS 5.5+)
        # up to the latest release; each entry runs BOTH resolution legs
        # (bundler + node16, D20), re-checks IntentRegistry augmentation across
        # the compiled declaration boundary, and (via all-subpaths.ts) parses
        # EVERY published subpath's .d.ts under the floor — not just the three
        # the app fixture happens to import.
        typescript: ["5.5.4", "5.9.2", "6.0.3", "latest"]
    steps:
      - uses: actions/checkout@v7
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v7
        with:
          node-version: latest
      - run: bun install --frozen-lockfile
      - name: Consumer typecheck (TS ${{ matrix.typescript }}, bundler + node16)
        env:
          TS_VERSION: ${{ matrix.typescript }}
        run: bun ci/consumer-smoke/run.ts "$TS_VERSION"
