name: Release
# Publishes packages to npm when a v* tag is pushed. Owner-approved automation (DECISIONS D21).
# Uses npm trusted publishing (OIDC provenance) — configure once per package on npmjs.com:
# package settings → Trusted publisher → GitHub Actions → catalint/telic, workflow release.yml.
# NOTE: a package's FIRST publish cannot use trusted publishing (the package must exist) —
# first publishes are manual; the version-exists guards below make re-runs green.
on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v7
        with:
          node-version: latest
          registry-url: https://registry.npmjs.org
      # OIDC trusted publishing requires npm >= 11.5.1 (Node 22 bundles 10.x)
      - run: npm install -g npm@latest
      - run: bun install --frozen-lockfile
      - run: bun run conventions
      - run: bun run build
      - run: bun run typecheck
      - run: bun run test
      - run: bun run size
      - name: "Guard — no workspace: ranges in publishable manifests"
        # npm publish does NOT rewrite workspace: ranges (D24). Check every
        # dependency MAP that carries version ranges — dependencies,
        # peerDependencies, and optionalDependencies. (bundledDependencies is an
        # array of names, not ranges, so it cannot carry a workspace: range.)
        run: |
          for pkg in core react lint; do
            MANIFEST="./packages/$pkg/package.json"
            if node -p "const m=require('$MANIFEST'); JSON.stringify({...m.dependencies, ...m.peerDependencies, ...m.optionalDependencies})" | grep -q "workspace:"; then
              echo "packages/$pkg has a workspace: range in a published dependency field — npm publish does NOT rewrite these"; exit 1
            fi
          done
      - name: Publish @telic/core
        working-directory: packages/core
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@telic/core@$VERSION" version > /dev/null 2>&1; then
            echo "@telic/core@$VERSION already published — skipping"
          elif OUT=$(npm publish --provenance --access public 2>&1); then
            echo "$OUT"
          elif echo "$OUT" | grep -q "previously published"; then
            # npm view can lag replication for brand-new packages; the 403 proves it exists
            echo "@telic/core@$VERSION already published (view lagged) — skipping"
          else
            echo "$OUT"; exit 1
          fi
      - name: Publish @telic/react
        working-directory: packages/react
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@telic/react@$VERSION" version > /dev/null 2>&1; then
            echo "@telic/react@$VERSION already published — skipping"
          elif OUT=$(npm publish --provenance --access public 2>&1); then
            echo "$OUT"
          elif echo "$OUT" | grep -q "previously published"; then
            # npm view can lag replication for brand-new packages; the 403 proves it exists
            echo "@telic/react@$VERSION already published (view lagged) — skipping"
          else
            echo "$OUT"; exit 1
          fi
      - name: Publish @telic/lint
        working-directory: packages/lint
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if npm view "@telic/lint@$VERSION" version > /dev/null 2>&1; then
            echo "@telic/lint@$VERSION already published — skipping"
          elif OUT=$(npm publish --provenance --access public 2>&1); then
            echo "$OUT"
          elif echo "$OUT" | grep -q "previously published"; then
            # npm view can lag replication for brand-new packages; the 403 proves it exists
            echo "@telic/lint@$VERSION already published (view lagged) — skipping"
          else
            echo "$OUT"; exit 1
          fi
