name: Release
# Publishes @telic/core to npm when a v* tag is pushed.
# Uses npm trusted publishing (OIDC provenance) — configure once on npmjs.com:
# package settings → Trusted publisher → GitHub Actions → catalint/telic, workflow release.yml.
on:
  push:
    tags:
      - "v*"
permissions:
  contents: read
  id-token: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun run test
      - run: bun run size
      - name: Publish
        working-directory: packages/core
        run: npm publish --provenance --access public
